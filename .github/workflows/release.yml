name: Build and Release CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: |
          set -eu
          go test ./...

      - name: Build and bundle
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -eu
          mkdir -p dist bin package
          ext=""
          if [ "$GOOS" = "windows" ]; then
            ext=".exe"
          fi

          GOOS="$GOOS" GOARCH="$GOARCH" CGO_ENABLED=0 \
            go build -trimpath -ldflags="-s -w" -o "bin/pgi${ext}" ./cmd/pgi

          cp "bin/pgi${ext}" "bin/personal-gitignore${ext}"

          package_dir="package/personal-gitignore_${GOOS}_${GOARCH}"
          mkdir -p "$package_dir"
          cp "bin/pgi${ext}" "$package_dir/pgi${ext}"
          cp "bin/personal-gitignore${ext}" "$package_dir/personal-gitignore${ext}"
          cp README.md "$package_dir/README.md"

          if [ "$GOOS" = "windows" ]; then
            (
              cd package
              zip -r "../dist/personal-gitignore_${GOOS}_${GOARCH}.zip" "personal-gitignore_${GOOS}_${GOARCH}"
            )
          else
            tar -C package -czf "dist/personal-gitignore_${GOOS}_${GOARCH}.tar.gz" "personal-gitignore_${GOOS}_${GOARCH}"
          fi

      - name: Upload bundled artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download bundled artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
